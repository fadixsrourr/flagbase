name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared types
        run: pnpm --filter @flagbase/types build

      - name: Build and test SDK
        run: |
          pnpm --filter flagbase-sdk build
          pnpm --filter flagbase-sdk test

      - name: Build React bindings
        run: pnpm --filter flagbase-react build

      - name: Build dashboard
        run: pnpm --filter @flagbase/dashboard build
        env:
          
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-project
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: ci-app-id
