name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - run: pnpm install --frozen-lockfile

      - name: Build shared types
        run: pnpm --filter @flagbase/types build

      - name: Build SDK
        run: pnpm --filter flagbase-sdk build

      - name: Unit tests
        run: pnpm --filter flagbase-sdk test

      - name: Integration tests (Firestore Emulator)
        run: pnpm exec firebase emulators:exec --only firestore --project demo-flagbase "pnpm --filter flagbase-sdk run test:integration"
        env:
          FIREBASE_PROJECT_ID: demo-flagbase

      - name: Build React bindings
        run: pnpm --filter flagbase-react build

      - name: Build dashboard
        working-directory: apps/dashboard
        run: pnpm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-project
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: ci-app-id
          FIREBASE_PROJECT_ID: ci-project
          FIREBASE_CLIENT_EMAIL: ci@ci.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY: "-----BEGIN RSA PRIVATE KEY-----\nMIIEowIBAAKCAQEA1234placeholder\n-----END RSA PRIVATE KEY-----"
